name: Build on Comment

on:
  issue_comment:
    types: [created]

env:
  # Go configuration
  GO_VERSION: '1.21'
  CGO_ENABLED: '0'
  GOOS: 'linux'
  GOARCH: 'amd64'
  
  # Container registry configuration
  REGISTRY: 'quay.io'
  NAMESPACE: 'bjozsa-redhat'
  IMAGE_NAME: 'kubevirt-redfish'

jobs:
  # Check if comment is from authorized maintainer
  check-permissions:
    if: |
      github.event.issue.pull_request != null &&
      (contains(github.event.comment.body, '#ready-to-test') || 
       contains(github.event.comment.body, '#ready-to-push')) &&
      github.event.comment.user.login != 'github-actions[bot]'
    
    runs-on: ubuntu-latest
    outputs:
      authorized: ${{ steps.check.outputs.authorized }}
      action: ${{ steps.parse-comment.outputs.action }}
      pr-number: ${{ steps.parse-comment.outputs.pr-number }}
      commit-sha: ${{ steps.parse-comment.outputs.commit-sha }}
    
    steps:
    - name: Parse comment
      id: parse-comment
      run: |
        COMMENT="${{ github.event.comment.body }}"
        PR_NUMBER="${{ github.event.issue.number }}"
        COMMIT_SHA="${{ github.event.issue.pull_request.head.sha }}"
        
        if [[ "$COMMENT" == *"#ready-to-test"* ]]; then
          echo "action=test" >> $GITHUB_OUTPUT
        elif [[ "$COMMENT" == *"#ready-to-push"* ]]; then
          echo "action=push" >> $GITHUB_OUTPUT
        fi
        
        echo "pr-number=$PR_NUMBER" >> $GITHUB_OUTPUT
        echo "commit-sha=$COMMIT_SHA" >> $GITHUB_OUTPUT
        
        echo "Parsed comment: action=$ACTION, PR=$PR_NUMBER, commit=$COMMIT_SHA"
    
    - name: Check maintainer permissions
      id: check
      run: |
        # List of authorized maintainers (GitHub usernames)
        MAINTAINERS=("bjozsa" "v1k0d3n")
        
        COMMENT_USER="${{ github.event.comment.user.login }}"
        echo "Comment from user: $COMMENT_USER"
        
        # Check if user is in maintainers list
        for maintainer in "${MAINTAINERS[@]}"; do
          if [[ "$COMMENT_USER" == "$maintainer" ]]; then
            echo "✅ User $COMMENT_USER is authorized"
            echo "authorized=true" >> $GITHUB_OUTPUT
            exit 0
          fi
        done
        
        echo "❌ User $COMMENT_USER is not authorized to trigger builds"
        echo "authorized=false" >> $GITHUB_OUTPUT
        
        # Post a comment explaining the issue
        gh pr comment ${{ github.event.issue.number }} --body "❌ **Build Trigger Denied**
        
        Only authorized maintainers can trigger builds with \`#ready-to-test\` or \`#ready-to-push\`.
        
        **Authorized maintainers:** ${MAINTAINERS[*]}
        **Your username:** $COMMENT_USER"
        
        exit 1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Validate stage (same as ci.yml)
  validate:
    needs: check-permissions
    if: needs.check-permissions.outputs.authorized == 'true'
    
    runs-on: ubuntu-latest
    steps:
    - name: Checkout PR code
      uses: actions/checkout@v4
      with:
        ref: ${{ needs.check-permissions.outputs.commit-sha }}
      
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: ${{ env.GO_VERSION }}
        cache: true
        
    - name: Validate Go module
      run: |
        echo "Validating Go module..."
        go mod download
        go mod verify
        
    - name: Check code formatting
      run: |
        echo "Checking code formatting..."
        go fmt ./...
        # Check if any files were changed by go fmt
        if [ -n "$(git status --porcelain)" ]; then
          echo "Code is not properly formatted. Run 'go fmt ./...' to fix."
          git diff
          exit 1
        fi
        
    - name: Tidy Go modules
      run: |
        echo "Tidying Go modules..."
        go mod tidy
        # Check if go.mod or go.sum were changed
        if [ -n "$(git status --porcelain go.mod go.sum)" ]; then
          echo "Go modules are not tidy. Run 'go mod tidy' to fix."
          git diff go.mod go.sum
          exit 1
        fi
        
    - name: Run static analysis
      run: |
        echo "Running static analysis..."
        go vet ./...
        
    - name: Run golangci-lint
      uses: golangci/golangci-lint-action@v3
      with:
        version: latest
        args: --timeout=5m
        only-new-issues: true
      continue-on-error: true

  # Code quality checks (same as ci.yml)
  code-quality:
    needs: check-permissions
    if: needs.check-permissions.outputs.authorized == 'true'
    
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
    - name: Checkout PR code
      uses: actions/checkout@v4
      with:
        ref: ${{ needs.check-permissions.outputs.commit-sha }}
      
    - name: Run code quality checks
      run: |
        echo "Running code quality checks..."
        echo "Checking for TODO comments..."
        find . -name "*.go" -exec grep -l "TODO" {} \; || echo "No TODO comments found"
        echo "Checking for FIXME comments..."
        find . -name "*.go" -exec grep -l "FIXME" {} \; || echo "No FIXME comments found"
        echo "Checking for debug prints..."
        find . -name "*.go" -exec grep -l "fmt.Print" {} \; || echo "No debug prints found"

  # Documentation check (same as ci.yml)
  docs-check:
    needs: check-permissions
    if: needs.check-permissions.outputs.authorized == 'true'
    
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
    - name: Checkout PR code
      uses: actions/checkout@v4
      with:
        ref: ${{ needs.check-permissions.outputs.commit-sha }}
      
    - name: Check documentation
      run: |
        echo "Checking documentation..."
        echo "Checking for package documentation..."
        find ./pkg -name "*.go" -exec grep -L "Package " {} \; || echo "All packages have documentation"
        echo "Checking README..."
        test -f README.md && echo "README.md exists" || echo "README.md missing"

  # Test stage (same as ci.yml)
  test:
    needs: check-permissions
    if: needs.check-permissions.outputs.authorized == 'true'
    
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
    - name: Checkout PR code
      uses: actions/checkout@v4
      with:
        ref: ${{ needs.check-permissions.outputs.commit-sha }}
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: ${{ env.GO_VERSION }}
        cache: true
        
    - name: Run tests
      run: |
        echo "Running tests..."
        go test -v ./...
        
    - name: Run tests with coverage
      run: |
        echo "Running tests with coverage..."
        go test -v -coverprofile=coverage.out ./...
        echo "Coverage summary:"
        go tool cover -func=coverage.out
        
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: ./coverage.out
        flags: unittests
        name: codecov-umbrella
        
    - name: Upload coverage artifact
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coverage.out
        retention-days: 7

  # Integration test (same as ci.yml)
  integration-test:
    needs: check-permissions
    if: needs.check-permissions.outputs.authorized == 'true'
    
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
    - name: Checkout PR code
      uses: actions/checkout@v4
      with:
        ref: ${{ needs.check-permissions.outputs.commit-sha }}
      
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: ${{ env.GO_VERSION }}
        cache: true
        
    - name: Run integration tests
      run: |
        echo "Running integration tests..."
        echo "Integration tests would run here..."
        echo "For now, this is a placeholder for integration test execution"

  # Security scan (same as ci.yml)
  security-scan:
    needs: check-permissions
    if: needs.check-permissions.outputs.authorized == 'true'
    
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
    - name: Checkout PR code
      uses: actions/checkout@v4
      with:
        ref: ${{ needs.check-permissions.outputs.commit-sha }}
      
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: ${{ env.GO_VERSION }}
        cache: true
        
    - name: List dependencies
      run: |
        echo "Listing Go dependencies..."
        go list -m all > deps.txt
        echo "Dependencies listed for security review"
        cat deps.txt
        
    - name: Upload dependencies artifact
      uses: actions/upload-artifact@v4
      with:
        name: dependencies-list
        path: deps.txt
        retention-days: 7
        
    - name: Run Go security checks
      run: |
        echo "Running basic security checks..."
        echo "Checking for potential security issues in dependencies..."
        go list -json -deps ./... | jq -r 'select(.Standard != true) | .ImportPath' | sort | uniq | head -20
        echo "Security scan completed - manual review recommended for production use"

  # Build stage (same as ci.yml)
  build:
    needs: [check-permissions, validate, test]
    if: needs.check-permissions.outputs.authorized == 'true'
    
    runs-on: ubuntu-latest
    steps:
    - name: Checkout PR code
      uses: actions/checkout@v4
      with:
        ref: ${{ needs.check-permissions.outputs.commit-sha }}
      
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: ${{ env.GO_VERSION }}
        cache: true
        
    - name: Build binary
      run: |
        echo "Ensuring dependencies are up to date..."
        go mod download
        go mod tidy
        echo "Building kubevirt-redfish binary..."
        go build -ldflags="-w -s" -o kubevirt-redfish ./cmd/main.go
        echo "Build completed successfully"
        ls -la kubevirt-redfish
        echo "Testing binary..."
        ./kubevirt-redfish --version || echo "Version command completed"
        
    - name: Upload binary artifact
      uses: actions/upload-artifact@v4
      with:
        name: kubevirt-redfish-binary
        path: kubevirt-redfish
        retention-days: 7

  # Container build and push (only for #ready-to-push)
  container-build-tag:
    needs: [check-permissions, build]
    if: needs.check-permissions.outputs.authorized == 'true' && needs.check-permissions.outputs.action == 'push'
    
    runs-on: ubuntu-latest
    steps:
    - name: Checkout PR code
      uses: actions/checkout@v4
      with:
        ref: ${{ needs.check-permissions.outputs.commit-sha }}
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Log in to Quay.io
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ secrets.QUAY_USERNAME }}
        password: ${{ secrets.QUAY_PASSWORD }}
        
    - name: Generate tags manually
      id: tags
      run: |
        COMMIT_SHA="${{ needs.check-permissions.outputs.commit-sha }}"
        PR_NUMBER="${{ needs.check-permissions.outputs.pr-number }}"
        IMAGE_BASE="${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}"
        
        # Debug: Show what we're working with
        echo "COMMIT_SHA: '${COMMIT_SHA}'"
        echo "PR_NUMBER: '${PR_NUMBER}'"
        echo "IMAGE_BASE: '${IMAGE_BASE}'"
        
        # Create tags like ci.yml does - only commit SHA initially
        SHORT_SHA="${COMMIT_SHA:0:8}"
        TAGS="${IMAGE_BASE}:${SHORT_SHA}"
        
        echo "Generated tags: ${TAGS}"
        echo "tags=${TAGS}" >> $GITHUB_OUTPUT
        echo "commit_sha=${SHORT_SHA}" >> $GITHUB_OUTPUT
        
    - name: Debug build context
      run: |
        echo "Build context contents:"
        ls -la .
        echo "Dockerfile exists:"
        ls -la Dockerfile
        echo "Dockerfile contents (first 10 lines):"
        head -10 Dockerfile
          
    - name: Build and push container image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: ${{ steps.tags.outputs.tags }}
        platforms: linux/amd64,linux/arm64
        cache-from: type=gha
        cache-to: type=gha,mode=max
        provenance: false
        sbom: false
        outputs: type=registry
        
    - name: Debug - Show what was pushed
      run: |
        echo "Container images pushed with tags:"
        echo "${{ steps.tags.outputs.tags }}"
        echo "Commit SHA: ${{ steps.tags.outputs.commit_sha }}"
        echo "Registry: ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}"
        
    - name: Tag and push additional tags
      run: |
        echo "Information from build job:"
        echo "Commit SHA: ${{ steps.tags.outputs.commit_sha }}"
        echo "Built tags: ${{ steps.tags.outputs.tags }}"
        
        # Use the commit SHA tag from the successful build
        COMMIT_SHA="${{ steps.tags.outputs.commit_sha }}"
        PR_NUMBER="${{ needs.check-permissions.outputs.pr-number }}"
        SOURCE_IMAGE="${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}:${COMMIT_SHA}"
        PR_IMAGE="${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}:pr-${PR_NUMBER}"
        LATEST_IMAGE="${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}:latest"
        
        echo "Creating additional tags from: ${SOURCE_IMAGE}"
        
        # Create PR tag
        echo "Creating PR tag: ${PR_IMAGE}"
        docker buildx imagetools create "${SOURCE_IMAGE}" --tag "${PR_IMAGE}"
        
        # Create latest tag
        echo "Creating latest tag: ${LATEST_IMAGE}"
        docker buildx imagetools create "${SOURCE_IMAGE}" --tag "${LATEST_IMAGE}"
        
        echo "Successfully created additional tags:"
        echo "- ${PR_IMAGE}"
        echo "- ${LATEST_IMAGE}"

  # Helm chart build and push (only for #ready-to-push)
  helm-chart-tag:
    needs: [check-permissions, container-build-tag]
    if: needs.check-permissions.outputs.authorized == 'true' && needs.check-permissions.outputs.action == 'push'
    
    runs-on: ubuntu-latest
    steps:
    - name: Checkout PR code
      uses: actions/checkout@v4
      with:
        ref: ${{ needs.check-permissions.outputs.commit-sha }}
      
    - name: Set up Helm
      uses: azure/setup-helm@v3
      with:
        version: 'v3.12.0'
      
    - name: Package Helm chart
      run: |
        echo "Packaging Helm chart..."
        helm package ./helm --destination ./charts
        echo "Helm chart packaged successfully"
        ls -la ./charts/
        
    - name: Upload Helm chart artifact
      uses: actions/upload-artifact@v4
      with:
        name: helm-chart
        path: ./charts/
        retention-days: 7

  # Post results comment
  post-results:
    needs: [check-permissions, validate, code-quality, docs-check, test, integration-test, security-scan, build, container-build-tag, helm-chart-tag]
    if: always() && needs.check-permissions.outputs.authorized == 'true'
    
    runs-on: ubuntu-latest
    steps:
    - name: Post test results comment
      if: needs.check-permissions.outputs.action == 'test'
      run: |
        if [[ "${{ needs.validate.result }}" == "success" && "${{ needs.code-quality.result }}" == "success" && "${{ needs.docs-check.result }}" == "success" && "${{ needs.test.result }}" == "success" && "${{ needs.integration-test.result }}" == "success" && "${{ needs.security-scan.result }}" == "success" && "${{ needs.build.result }}" == "success" ]]; then
          gh pr comment ${{ needs.check-permissions.outputs.pr-number }} --body "✅ **Test Build Successful**
          
          **Commit:** \`${{ needs.check-permissions.outputs.commit-sha }}\`
          
          **All tests passed:**
          - ✅ Validate
          - ✅ Code Quality  
          - ✅ Documentation Check
          - ✅ Tests
          - ✅ Integration Tests
          - ✅ Security Scan
          - ✅ Build
          
          **Note:** This was a test build only. Use \`#ready-to-push\` to build and push containers + helm charts."
        else
          gh pr comment ${{ needs.check-permissions.outputs.pr-number }} --body "❌ **Test Build Failed**
          
          **Commit:** \`${{ needs.check-permissions.outputs.commit-sha }}\`
          
          **Failed jobs:**
          ${{ needs.validate.result == 'failure' && '- ❌ Validate' || '' }}
          ${{ needs.code-quality.result == 'failure' && '- ❌ Code Quality' || '' }}
          ${{ needs.docs-check.result == 'failure' && '- ❌ Documentation Check' || '' }}
          ${{ needs.test.result == 'failure' && '- ❌ Tests' || '' }}
          ${{ needs.integration-test.result == 'failure' && '- ❌ Integration Tests' || '' }}
          ${{ needs.security-scan.result == 'failure' && '- ❌ Security Scan' || '' }}
          ${{ needs.build.result == 'failure' && '- ❌ Build' || '' }}
          
          Please check the [workflow logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details."
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Post push results comment
      if: needs.check-permissions.outputs.action == 'push'
      run: |
        if [[ "${{ needs.validate.result }}" == "success" && "${{ needs.code-quality.result }}" == "success" && "${{ needs.docs-check.result }}" == "success" && "${{ needs.test.result }}" == "success" && "${{ needs.integration-test.result }}" == "success" && "${{ needs.security-scan.result }}" == "success" && "${{ needs.build.result }}" == "success" && "${{ needs.container-build-tag.result }}" == "success" && "${{ needs.helm-chart-tag.result }}" == "success" ]]; then
          gh pr comment ${{ needs.check-permissions.outputs.pr-number }} --body "🚀 **Build and Push Successful**
          
          **Commit:** \`${{ needs.check-permissions.outputs.commit-sha }}\`
          
          **All jobs completed:**
          - ✅ Validate
          - ✅ Code Quality  
          - ✅ Documentation Check
          - ✅ Tests
          - ✅ Integration Tests
          - ✅ Security Scan
          - ✅ Build
          - ✅ Container Build & Push
          - ✅ Helm Chart Package
          
          **Container tags pushed:**
          - \`${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ steps.tags.outputs.commit_sha }}\`
          - \`${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}:pr-${{ needs.check-permissions.outputs.pr-number }}\`
          - \`${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}:latest\`
          
          **Registry:** ${{ env.REGISTRY }}/${{ env.NAMESPACE }}"
        else
          gh pr comment ${{ needs.check-permissions.outputs.pr-number }} --body "❌ **Build and Push Failed**
          
          **Commit:** \`${{ needs.check-permissions.outputs.commit-sha }}\`
          
          **Failed jobs:**
          ${{ needs.validate.result == 'failure' && '- ❌ Validate' || '' }}
          ${{ needs.code-quality.result == 'failure' && '- ❌ Code Quality' || '' }}
          ${{ needs.docs-check.result == 'failure' && '- ❌ Documentation Check' || '' }}
          ${{ needs.test.result == 'failure' && '- ❌ Tests' || '' }}
          ${{ needs.integration-test.result == 'failure' && '- ❌ Integration Tests' || '' }}
          ${{ needs.security-scan.result == 'failure' && '- ❌ Security Scan' || '' }}
          ${{ needs.build.result == 'failure' && '- ❌ Build' || '' }}
          ${{ needs.container-build-tag.result == 'failure' && '- ❌ Container Build & Push' || '' }}
          ${{ needs.helm-chart-tag.result == 'failure' && '- ❌ Helm Chart Package' || '' }}
          
          Please check the [workflow logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details."
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}